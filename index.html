<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oyaa.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- File extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <!-- Markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <!-- Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js"></script>
  <style>
    /* ── Tokens ──────────────────────────────────────────────────────────── */
    :root {
      --green:        #1A5C3A;
      --green-hover:  #154D30;
      --green-deep:   #123D27;
      --green-light:  #EBF4EF;
      --green-border: #C4D9CC;
      --bg:           #F7F5F2;
      --white:        #FFFFFF;
      --text:         #1F1F1F;
      --text-sec:     #5A574F;
      --text-muted:   #8A877F;
      --border:       #E4DFD8;
      --border-light: #EDE9E3;
      --shadow:       0 2px 12px rgba(31, 20, 10, 0.07), 0 1px 2px rgba(31, 20, 10, 0.04);
    }

    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .site-header {
      background: var(--green);
      padding: 44px 0 52px;
    }

    .site-header .container {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.8px;
      color: var(--white);
      line-height: 1;
    }

    .tagline {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.68);
      margin-top: 8px;
      font-weight: 400;
      letter-spacing: -0.1px;
    }

    .description {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 16px;
      line-height: 1.7;
      max-width: 480px;
    }

    /* ── Main content ────────────────────────────────────────────────────── */
    .main-content {
      padding: 36px 0 80px;
    }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      padding: 32px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    /* ── Labels ──────────────────────────────────────────────────────────── */
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.9px;
    }

    /* ── Textarea ────────────────────────────────────────────────────────── */
    textarea {
      width: 100%;
      min-height: 200px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      line-height: 1.65;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      background: #FAFAF8;
    }

    textarea:focus {
      border-color: var(--green);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(26, 92, 58, 0.1);
    }

    textarea::placeholder { color: #C4BFB8; }

    textarea.drag-over {
      border-color: var(--green);
      border-style: dashed;
      background: var(--green-light);
      box-shadow: 0 0 0 3px rgba(26, 92, 58, 0.1);
    }

    .file-status {
      margin-top: 8px;
      font-size: 12px;
      min-height: 18px;
    }

    .file-status.loading { color: var(--text-muted); }
    .file-status.success { color: var(--green); }
    .file-status.error   { color: #C0392B; }

    /* ── Divider ─────────────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border-light);
      margin: 28px 0;
    }

    /* ── Output type buttons ─────────────────────────────────────────────── */
    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    @media (max-width: 560px) { .button-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 360px) { .button-grid { grid-template-columns: 1fr; } }

    .output-btn {
      background: #FAFAF8;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 13px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sec);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s, box-shadow 0.15s;
      line-height: 1.4;
    }

    .output-btn:hover {
      border-color: var(--green-border);
      background: var(--green-light);
      color: var(--green);
    }

    .output-btn:active { transform: scale(0.98); }

    .output-btn.active {
      background: var(--green);
      border-color: var(--green);
      color: var(--white);
      box-shadow: 0 2px 8px rgba(26, 92, 58, 0.25);
    }

    .btn-number {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--border);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .output-btn:hover .btn-number   { color: var(--green-border); }
    .output-btn.active .btn-number  { color: rgba(255, 255, 255, 0.45); }

    /* ── Generate button ─────────────────────────────────────────────────── */
    #generateBtn {
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 13px 28px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.1px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(26, 92, 58, 0.3);
    }

    #generateBtn:hover {
      background: var(--green-hover);
      box-shadow: 0 3px 12px rgba(26, 92, 58, 0.35);
    }

    #generateBtn:active  { transform: scale(0.98); }

    #generateBtn:disabled {
      background: #B8B4AD;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Output card ─────────────────────────────────────────────────────── */
    .output-card { display: none; }

    .output-card.visible {
      display: block;
      border-left: 3px solid var(--green);
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
    }

    .output-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.9px;
      flex-shrink: 0;
    }

    .output-actions {
      display: none;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ── Action buttons (copy / pdf / word) ──────────────────────────────── */
    .action-btn {
      background: none;
      border: 1px solid var(--green-border);
      border-radius: 7px;
      padding: 6px 12px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--green);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .action-btn:hover {
      background: var(--green);
      border-color: var(--green);
      color: var(--white);
    }

    .action-btn.success {
      background: var(--green);
      border-color: var(--green);
      color: var(--white);
    }

    /* ── Spinner ─────────────────────────────────────────────────────────── */
    .spinner-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Output content ──────────────────────────────────────────────────── */
    .output-content {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      background: #FAFAF8;
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 24px;
    }

    .output-content h1,
    .output-content h2,
    .output-content h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--green-deep);
      margin-top: 22px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .output-content h1:first-child,
    .output-content h2:first-child,
    .output-content h3:first-child { margin-top: 0; }

    .output-content p          { margin-bottom: 12px; }
    .output-content p:last-child { margin-bottom: 0; }

    .output-content ul,
    .output-content ol {
      padding-left: 20px;
      margin-bottom: 12px;
    }

    .output-content li { margin-bottom: 5px; }

    .output-content strong {
      font-weight: 600;
      color: var(--text);
    }

    .output-content hr {
      border: none;
      border-top: 1px solid var(--border-light);
      margin: 18px 0;
    }

    /* Tables */
    .output-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 14px;
      font-size: 13px;
    }

    .output-content th,
    .output-content td {
      border: 1px solid var(--border);
      padding: 9px 13px;
      text-align: left;
      line-height: 1.5;
      vertical-align: top;
    }

    .output-content th {
      background: var(--green-light);
      font-weight: 600;
      color: var(--green-deep);
    }

    .output-content tr:nth-child(even) td { background: #FAFAF8; }

    /* ── Error ───────────────────────────────────────────────────────────── */
    .error-msg {
      font-size: 13px;
      color: #B33;
      padding: 16px;
      background: #FDF4F4;
      border-radius: 8px;
      border: 1px solid #F0D0D0;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="logo">Oyaa.</div>
      <div class="tagline">Van gesprek naar geregeld, in minuten.</div>
      <p class="description">Stop met uitwerken, begin met doen. Zet je gespreksnotities in een handomdraai om in een briefing, debrief of actielijst. ✓ Done.</p>
    </div>
  </header>

  <div class="main-content">
    <div class="container">

      <div class="card">
        <label class="field-label" for="transcript">Jouw notities</label>
        <textarea
          id="transcript"
          placeholder="Plak hier het transcript van je vergadering, gesprek of call… of sleep een bestand hierin (.txt, .pdf, .doc, .docx)"
          spellcheck="false"
        ></textarea>
        <div id="fileStatus" class="file-status"></div>

        <div class="divider"></div>

        <label class="field-label">Wat wil je maken?</label>
        <div class="button-grid">
          <button class="output-btn" data-type="summary-actions">
            <span class="btn-number">01</span>
            Samenvatting met actiepunten
          </button>
          <button class="output-btn" data-type="internal-briefing">
            <span class="btn-number">02</span>
            Interne briefing
          </button>
          <button class="output-btn" data-type="external-debrief">
            <span class="btn-number">03</span>
            Externe debrief naar klant
          </button>
          <button class="output-btn" data-type="internal-actions">
            <span class="btn-number">04</span>
            Actiepunten intern
          </button>
          <button class="output-btn" data-type="external-actions">
            <span class="btn-number">05</span>
            Actiepunten extern
          </button>
          <button class="output-btn" data-type="project-planning">
            <span class="btn-number">06</span>
            Projectplanning aanzet
          </button>
        </div>

        <div id="generateWrap" style="display:none; margin-top: 24px;">
          <button id="generateBtn" onclick="generate()">Verwerk</button>
        </div>
      </div>

      <div class="card output-card" id="outputCard">
        <div class="output-header">
          <span class="output-title" id="outputTitle">Output</span>
          <div class="output-actions" id="outputActions">
            <button class="action-btn" id="copyBtn" onclick="copyOutput()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              Kopiëren
            </button>
            <button class="action-btn" id="pdfBtn" onclick="downloadPDF()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              PDF
            </button>
            <button class="action-btn" id="wordBtn" onclick="downloadWord()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              Word
            </button>
          </div>
        </div>
        <div id="outputBody"></div>
      </div>

    </div>
  </div>

  <script>
    // ── PDF.js worker ─────────────────────────────────────────────────────
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    // ── marked.js config ─────────────────────────────────────────────────
    marked.setOptions({ gfm: true, breaks: true });

    // ── Drag & drop ───────────────────────────────────────────────────────

    const ta         = document.getElementById('transcript');
    const fileStatus = document.getElementById('fileStatus');
    const SUPPORTED  = ['.txt', '.pdf', '.doc', '.docx'];

    function setStatus(msg, type) {
      fileStatus.textContent = msg;
      fileStatus.className = 'file-status ' + (type || '');
    }

    ta.addEventListener('dragover', (e) => {
      e.preventDefault();
      ta.classList.add('drag-over');
    });

    ta.addEventListener('dragleave', (e) => {
      if (!ta.contains(e.relatedTarget)) ta.classList.remove('drag-over');
    });

    ta.addEventListener('drop', (e) => {
      e.preventDefault();
      ta.classList.remove('drag-over');

      const file = e.dataTransfer.files[0];
      if (!file) return;

      const name = file.name.toLowerCase();
      const ext  = name.slice(name.lastIndexOf('.'));

      if (!SUPPORTED.includes(ext)) {
        setStatus(`Bestandstype "${ext}" wordt niet ondersteund. Gebruik .txt, .pdf, .doc of .docx.`, 'error');
        return;
      }

      setStatus('Bestand wordt ingelezen…', 'loading');

      if (ext === '.txt')         readTxt(file);
      else if (ext === '.pdf')    readPdf(file);
      else                        readDocx(file);
    });

    function readTxt(file) {
      const reader = new FileReader();
      reader.onload  = (e) => { ta.value = e.target.result; setStatus(`"${file.name}" ingeladen.`, 'success'); };
      reader.onerror = ()  => setStatus('Fout bij het lezen van het bestand.', 'error');
      reader.readAsText(file);
    }

    async function readPdf(file) {
      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let text = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page    = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(item => item.str).join(' ') + '\n';
        }
        ta.value = text.trim();
        setStatus(`"${file.name}" ingeladen (${pdf.numPages} pagina's).`, 'success');
      } catch {
        setStatus('Fout bij het uitlezen van de PDF.', 'error');
      }
    }

    async function readDocx(file) {
      try {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer });
        ta.value = result.value.trim();
        setStatus(`"${file.name}" ingeladen.`, 'success');
      } catch {
        setStatus('Fout bij het uitlezen van het Word-bestand.', 'error');
      }
    }

    // ── Output types ──────────────────────────────────────────────────────

    const OUTPUT_TITLES = {
      'summary-actions':    'Samenvatting met actiepunten',
      'internal-briefing':  'Interne briefing',
      'external-debrief':   'Externe debrief naar klant',
      'internal-actions':   'Actiepunten intern',
      'external-actions':   'Actiepunten extern',
      'project-planning':   'Projectplanning aanzet'
    };

    let rawOutput    = '';
    let selectedType = null;

    // ── Step 1: select output type ────────────────────────────────────────

    document.querySelectorAll('.output-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedType = btn.dataset.type;
        document.querySelectorAll('.output-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('generateWrap').style.display = 'block';
      });
    });

    // ── Step 2: generate ──────────────────────────────────────────────────

    function generate() {
      const transcript = ta.value.trim();
      if (!transcript) {
        ta.focus();
        ta.style.borderColor = '#C0392B';
        ta.style.boxShadow   = '0 0 0 3px rgba(192,57,43,0.12)';
        setTimeout(() => { ta.style.borderColor = ''; ta.style.boxShadow = ''; }, 1200);
        return;
      }

      const card    = document.getElementById('outputCard');
      const body    = document.getElementById('outputBody');
      const actions = document.getElementById('outputActions');
      const genBtn  = document.getElementById('generateBtn');

      document.getElementById('outputTitle').textContent = OUTPUT_TITLES[selectedType];
      body.innerHTML = `
        <div class="spinner-wrapper">
          <div class="spinner"></div>
          <span>Bezig met verwerken…</span>
        </div>`;
      actions.style.display = 'none';
      rawOutput = '';
      genBtn.disabled = true;

      card.classList.add('visible');
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript, outputType: selectedType })
      })
        .then(res => res.json())
        .then(data => {
          genBtn.disabled = false;
          if (data.error) {
            body.innerHTML = `<div class="error-msg">${escapeHtml(data.error)}</div>`;
          } else {
            rawOutput = data.result;
            body.innerHTML = `<div class="output-content">${marked.parse(rawOutput)}</div>`;
            actions.style.display = 'flex';
          }
        })
        .catch(() => {
          genBtn.disabled = false;
          body.innerHTML = `<div class="error-msg">Er is een fout opgetreden. Controleer je verbinding en probeer het opnieuw.</div>`;
        });
    }

    // ── Copy ──────────────────────────────────────────────────────────────

    function copyOutput() {
      if (!rawOutput) return;
      navigator.clipboard.writeText(rawOutput).then(() => {
        flashBtn('copyBtn', `
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg> Gekopieerd`,
          `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg> Kopiëren`
        );
      });
    }

    function flashBtn(id, successHtml, resetHtml) {
      const btn = document.getElementById(id);
      btn.innerHTML = successHtml;
      btn.classList.add('success');
      setTimeout(() => { btn.innerHTML = resetHtml; btn.classList.remove('success'); }, 2200);
    }

    // ── PDF download ──────────────────────────────────────────────────────

    function downloadPDF() {
      if (!rawOutput) return;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });

      const title    = OUTPUT_TITLES[selectedType] || 'Output';
      const margin   = 20;
      const maxWidth = 210 - margin * 2;
      let y          = 20;

      const addPage = () => { doc.addPage(); y = 20; };
      const checkY  = (needed) => { if (y + needed > 280) addPage(); };

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(14);
      doc.text(title, margin, y);
      y += 10;

      doc.setFontSize(10);

      for (const raw of rawOutput.split('\n')) {
        const line = raw.trim();

        if (line === '') { y += 3; continue; }

        const headingMatch = line.match(/^\*\*(.+?)\*\*(.*)$/);
        if (headingMatch) {
          const boldPart = headingMatch[1];
          const restPart = headingMatch[2].replace(/^[\s—]+/, '');
          checkY(8);
          y += 2;
          doc.setFont('helvetica', 'bold');
          const boldWrapped = doc.splitTextToSize(boldPart + (restPart ? ' — ' + restPart : ''), maxWidth);
          doc.text(boldWrapped, margin, y);
          y += boldWrapped.length * 5.5;
          doc.setFont('helvetica', 'normal');
          continue;
        }

        const listMatch = line.match(/^[-*]\s+(.+)$/) || line.match(/^\d+\.\s+(.+)$/);
        if (listMatch) {
          const text    = listMatch[1].replace(/\*\*/g, '').replace(/\*/g, '');
          const wrapped = doc.splitTextToSize('• ' + text, maxWidth - 4);
          checkY(wrapped.length * 5);
          doc.text(wrapped, margin + 4, y);
          y += wrapped.length * 5;
          continue;
        }

        const text    = line.replace(/\*\*/g, '').replace(/\*/g, '');
        const wrapped = doc.splitTextToSize(text, maxWidth);
        checkY(wrapped.length * 5);
        doc.text(wrapped, margin, y);
        y += wrapped.length * 5;
      }

      doc.save((title.toLowerCase().replace(/[\s/]+/g, '-')) + '.pdf');
    }

    // ── Word download ─────────────────────────────────────────────────────

    async function downloadWord() {
      if (!rawOutput || typeof docx === 'undefined') return;

      const title      = OUTPUT_TITLES[selectedType] || 'Output';
      const paragraphs = [];

      paragraphs.push(new docx.Paragraph({
        children: [new docx.TextRun({ text: title, bold: true, size: 28 })],
        spacing: { after: 280 }
      }));

      for (const raw of rawOutput.split('\n')) {
        const line = raw.trim();

        if (line === '') {
          paragraphs.push(new docx.Paragraph({ text: '', spacing: { after: 60 } }));
          continue;
        }

        const headingMatch = line.match(/^\*\*(.+?)\*\*(.*)$/);
        if (headingMatch) {
          const boldText = headingMatch[1];
          const rest     = headingMatch[2].replace(/^[\s—]+/, '');
          const runs     = [new docx.TextRun({ text: boldText, bold: true, size: 22 })];
          if (rest) runs.push(new docx.TextRun({ text: ' — ' + rest, size: 22 }));
          paragraphs.push(new docx.Paragraph({ children: runs, spacing: { before: 200, after: 80 } }));
          continue;
        }

        const listMatch = line.match(/^[-*]\s+(.+)$/) || line.match(/^\d+\.\s+(.+)$/);
        if (listMatch) {
          const runs = parseInlineRuns(listMatch[1], 20);
          paragraphs.push(new docx.Paragraph({
            children: [new docx.TextRun({ text: '• ', size: 20 }), ...runs],
            indent: { left: 360 },
            spacing: { after: 60 }
          }));
          continue;
        }

        paragraphs.push(new docx.Paragraph({
          children: parseInlineRuns(line, 20),
          spacing: { after: 100 }
        }));
      }

      function parseInlineRuns(text, size) {
        return text.split(/(\*\*[^*]+\*\*)/)
          .filter(p => p.length > 0)
          .map(p => p.startsWith('**') && p.endsWith('**')
            ? new docx.TextRun({ text: p.slice(2, -2), bold: true, size })
            : new docx.TextRun({ text: p.replace(/\*/g, ''), size })
          );
      }

      const wordDoc = new docx.Document({
        sections: [{ properties: {}, children: paragraphs }]
      });

      const blob     = await docx.Packer.toBlob(wordDoc);
      const url      = URL.createObjectURL(blob);
      const anchor   = window.document.createElement('a');
      const filename = title.toLowerCase().replace(/[\s/]+/g, '-') + '.docx';
      anchor.href     = url;
      anchor.download = filename;
      anchor.click();
      URL.revokeObjectURL(url);
    }

    // ── Helpers ───────────────────────────────────────────────────────────

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
